services:
  apsara-website:
    build: .
    container_name: apsara-website
    restart: unless-stopped
    networks:
      - coolify
    expose:
      - "80"
    labels:
      - traefik.enable=true
      # HTTPS router
      - traefik.http.routers.apsara-website-https.rule=Host(`apsara.software`) || Host(`apsara.ocioapp.ai`)
      - traefik.http.routers.apsara-website-https.entrypoints=https
      - traefik.http.routers.apsara-website-https.tls=true
      - traefik.http.routers.apsara-website-https.service=apsara-website
      # HTTP → HTTPS redirect
      - traefik.http.routers.apsara-website-http.rule=Host(`apsara.software`) || Host(`apsara.ocioapp.ai`)
      - traefik.http.routers.apsara-website-http.entrypoints=http
      - traefik.http.routers.apsara-website-http.middlewares=apsara-https-redirect
      - traefik.http.middlewares.apsara-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.apsara-https-redirect.redirectscheme.permanent=true
      # Service port
      - traefik.http.services.apsara-website.loadbalancer.server.port=80

networks:
  coolify:
    external: true
