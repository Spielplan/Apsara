services:
  apsara-website:
    build: .
    container_name: apsara-website
    restart: unless-stopped
    networks:
      - coolify
    expose:
      - "80"
    labels:
      - traefik.enable=true
      # HTTPS router
      - traefik.http.routers.apsara-website-https.rule=Host(`apsara.software`) || Host(`www.apsara.software`)
      - traefik.http.routers.apsara-website-https.entrypoints=https
      - traefik.http.routers.apsara-website-https.tls=true
      - traefik.http.routers.apsara-website-https.service=apsara-website
      # HTTP router (redirect to HTTPS)
      - traefik.http.routers.apsara-website-http.rule=Host(`apsara.software`) || Host(`www.apsara.software`)
      - traefik.http.routers.apsara-website-http.entrypoints=http
      - traefik.http.routers.apsara-website-http.middlewares=apsara-website-https-redirect
      # HTTPS redirect middleware
      - traefik.http.middlewares.apsara-website-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.apsara-website-https-redirect.redirectscheme.permanent=true
      # www to non-www redirect
      - traefik.http.routers.apsara-website-www.rule=Host(`www.apsara.software`)
      - traefik.http.routers.apsara-website-www.entrypoints=https
      - traefik.http.routers.apsara-website-www.tls=true
      - traefik.http.routers.apsara-website-www.middlewares=apsara-website-www-redirect
      - traefik.http.middlewares.apsara-website-www-redirect.redirectregex.regex=^https://www\.apsara\.software/(.*)
      - traefik.http.middlewares.apsara-website-www-redirect.redirectregex.replacement=https://apsara.software/$${1}
      - traefik.http.middlewares.apsara-website-www-redirect.redirectregex.permanent=true
      # Service port
      - traefik.http.services.apsara-website.loadbalancer.server.port=80

networks:
  coolify:
    external: true
